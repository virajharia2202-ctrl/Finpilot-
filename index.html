<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0A0F">
<title>FinPilot — Smart Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, setDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2fN4dR88eYOtZ5VoZ2QJuT1DdcBu5Mr0",
  authDomain: "finpilot-b2d81.firebaseapp.com",
  projectId: "finpilot-b2d81",
  storageBucket: "finpilot-b2d81.firebasestorage.app",
  messagingSenderId: "714059291849",
  appId: "1:714059291849:web:adf97ff074613f2e698118",
  measurementId: "G-MR1G2MC2ZP"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ──
let currentUser=null, transactions=[], budgets=[], goals=[], accounts=[], recurring=[];
let unsubTx=null, unsubBudget=null, unsubGoals=null, unsubAccounts=null, unsubRecurring=null;
let activeTab='dashboard';

// ── Theme ──
let appTheme = localStorage.getItem('fp_theme')||'dark';
const applyTheme = () => { document.documentElement.setAttribute('data-theme', appTheme); localStorage.setItem('fp_theme', appTheme); };
applyTheme();

// ── Currency ──
const CURRENCIES=[
  {code:'USD',symbol:'$',name:'US Dollar'},{code:'EUR',symbol:'€',name:'Euro'},
  {code:'GBP',symbol:'£',name:'British Pound'},{code:'INR',symbol:'₹',name:'Indian Rupee'},
  {code:'JPY',symbol:'¥',name:'Japanese Yen'},{code:'CAD',symbol:'CA$',name:'Canadian Dollar'},
  {code:'AUD',symbol:'A$',name:'Australian Dollar'},{code:'SGD',symbol:'S$',name:'Singapore Dollar'},
  {code:'AED',symbol:'AED',name:'UAE Dirham'},{code:'CHF',symbol:'Fr',name:'Swiss Franc'},
  {code:'CNY',symbol:'CNY',name:'Chinese Yuan'},{code:'BRL',symbol:'R$',name:'Brazilian Real'},
  {code:'MXN',symbol:'MX$',name:'Mexican Peso'},{code:'ZAR',symbol:'R',name:'South African Rand'},
];
let userCurrency = JSON.parse(localStorage.getItem('fp_currency')||'{"code":"USD","symbol":"$","name":"US Dollar"}');
const CS = () => {
  try { const s=localStorage.getItem('fp_currency'); if(s) userCurrency=JSON.parse(s); } catch(e) {}
  return userCurrency.symbol;
};
const setCurrency = c => { userCurrency=c; localStorage.setItem('fp_currency',JSON.stringify(c)); };

// ── Categories ──
const CATEGORIES = {
  income:[
    {id:'salary',label:'Salary',icon:'💼',color:'#00D4A3'},
    {id:'freelance',label:'Freelance',icon:'💻',color:'#00B8FF'},
    {id:'investment',label:'Investment',icon:'📈',color:'#7B61FF'},
    {id:'gift',label:'Gift',icon:'🎁',color:'#FF6B9D'},
    {id:'other_inc',label:'Other Income',icon:'💰',color:'#FFB800'},
  ],
  expense:[
    {id:'food',label:'Food & Dining',icon:'🍔',color:'#FF6B6B'},
    {id:'transport',label:'Transport',icon:'🚗',color:'#FF9F43'},
    {id:'shopping',label:'Shopping',icon:'🛍️',color:'#FF6B9D'},
    {id:'entertain',label:'Entertainment',icon:'🎬',color:'#A29BFE'},
    {id:'health',label:'Health',icon:'💊',color:'#00D4A3'},
    {id:'bills',label:'Bills',icon:'📄',color:'#74B9FF'},
    {id:'education',label:'Education',icon:'📚',color:'#FDCB6E'},
    {id:'travel',label:'Travel',icon:'✈️',color:'#6C5CE7'},
    {id:'other_exp',label:'Other',icon:'💸',color:'#B2BEC3'},
  ]
};
const allCats = [...CATEGORIES.income,...CATEGORIES.expense];
const getCat  = id => allCats.find(c=>c.id===id)||{id,label:id,icon:'💰',color:'#B2BEC3'};
const fmt     = n => parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtC    = n => CS()+fmt(n);
const fmtDate = d => { try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d;} };
const currMonth  = () => new Date().toISOString().substring(0,7);
const monthLabel = () => new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});

// ── Auth State ──
onAuthStateChanged(auth, user => {
  currentUser=user;
  if(user){ startListeners(); showApp(); }
  else { stopListeners(); showAuth('login'); }
});

function startListeners(){
  const uid=currentUser.uid;
  unsubTx = onSnapshot(query(collection(db,'users',uid,'transactions'),orderBy('date','desc')), snap=>{
    transactions=snap.docs.map(d=>({id:d.id,...d.data()}));
    refresh(); checkBudgetAlerts();
  });
  unsubBudget = onSnapshot(collection(db,'users',uid,'budgets'), snap=>{
    budgets=snap.docs.map(d=>({id:d.id,...d.data()}));
    refresh();
  });
  unsubGoals = onSnapshot(collection(db,'users',uid,'goals'), snap=>{
    goals=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(activeTab==='goals') renderGoals();
    if(activeTab==='dashboard') renderDashboard();
  });
  unsubAccounts = onSnapshot(collection(db,'users',uid,'accounts'), snap=>{
    accounts=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(activeTab==='dashboard') renderDashboard();
    if(activeTab==='accounts') renderAccounts();
  });
  unsubRecurring = onSnapshot(collection(db,'users',uid,'recurring'), snap=>{
    recurring=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(activeTab==='recurring') renderRecurring();
  });
}
function stopListeners(){
  [unsubTx,unsubBudget,unsubGoals,unsubAccounts,unsubRecurring].forEach(u=>u&&u());
  transactions=[];budgets=[];goals=[];accounts=[];recurring=[];
}
function refresh(){
  if(activeTab==='dashboard') renderDashboard();
  if(activeTab==='transactions') renderTransactions();
  if(activeTab==='insights') renderInsights();
  if(activeTab==='budget') renderBudget();
}

// ── Toast ──
function showToast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),50);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3500);
}

// ── Budget Alerts ──
function checkBudgetAlerts(){
  const cm=currMonth();
  const mb=budgets.filter(b=>b.month===cm);
  const exTx=getMonthTx().filter(t=>t.type==='expense');
  mb.forEach(b=>{
    const spent=exTx.filter(t=>t.category===b.category).reduce((s,t)=>s+t.amount,0);
    const pct=b.amount>0?(spent/b.amount)*100:0;
    if(pct>=100) showToast(`🚨 ${getCat(b.category).label} budget exceeded!`,'danger');
    else if(pct>=80) showToast(`⚠️ ${getCat(b.category).label} at ${pct.toFixed(0)}%!`,'warning');
  });
}

// ── Auth UI ──
function showAuth(mode){
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
  renderAuthForm(mode);
}
function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  setTab('dashboard');
}
function renderAuthForm(mode){
  const isLogin=mode==='login';
  document.getElementById('auth-screen').innerHTML=`
    <div class="auth-bg"><div class="auth-glow g1"></div><div class="auth-glow g2"></div></div>
    <div class="auth-card">
      <div class="auth-logo"><div class="auth-logo-icon">✈</div><div class="auth-logo-name">FinPilot</div></div>
      <div class="auth-tagline">Your smart money navigator</div>
      <div class="auth-tabs">
        <button class="auth-tab ${isLogin?'active':''}" onclick="window._authSwitch('login')">Sign In</button>
        <button class="auth-tab ${!isLogin?'active':''}" onclick="window._authSwitch('register')">Create Account</button>
      </div>
      <div id="auth-error" class="auth-error" style="display:none"></div>
      <div class="auth-form">
        ${!isLogin?`<div class="inp-group"><label class="inp-lbl">FULL NAME</label><input id="auth-name" class="inp" type="text" placeholder="Viraj Haria" autocomplete="name"></div>`:''}
        <div class="inp-group"><label class="inp-lbl">EMAIL</label><input id="auth-email" class="inp" type="email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="inp-group"><label class="inp-lbl">PASSWORD</label>
          <div class="inp-wrap"><input id="auth-pass" class="inp" type="password" placeholder="••••••••"><button class="inp-eye" onclick="window._togglePw('auth-pass',this)">👁</button></div>
        </div>
        ${!isLogin?`<div class="inp-group"><label class="inp-lbl">CONFIRM PASSWORD</label>
          <div class="inp-wrap"><input id="auth-pass2" class="inp" type="password" placeholder="••••••••"><button class="inp-eye" onclick="window._togglePw('auth-pass2',this)">👁</button></div>
        </div>`:''}
        <button class="btn-primary" id="auth-submit" onclick="window._authSubmit('${mode}')">${isLogin?'Sign In to FinPilot':'Create My Account'}</button>
      </div>
      <div class="auth-footer">${isLogin?`New here? <span class="auth-link" onclick="window._authSwitch('register')">Create account →</span>`:`Have account? <span class="auth-link" onclick="window._authSwitch('login')">Sign in →</span>`}</div>
    </div>`;
}
window._authSwitch = m => renderAuthForm(m);
window._togglePw = (id,btn) => { const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; btn.textContent=i.type==='password'?'👁':'🙈'; };
window._authSubmit = async mode => {
  const btn=document.getElementById('auth-submit');
  const errEl=document.getElementById('auth-error'); errEl.style.display='none';
  const email=document.getElementById('auth-email')?.value?.trim();
  const pass=document.getElementById('auth-pass')?.value;
  if(!email||!pass){showErr('Fill all fields.');return;}
  btn.textContent='...';btn.disabled=true;
  try{
    if(mode==='login'){
      await signInWithEmailAndPassword(auth,email,pass);
    }else{
      const name=document.getElementById('auth-name')?.value?.trim();
      const pass2=document.getElementById('auth-pass2')?.value;
      if(!name){showErr('Enter your name.');reset();return;}
      if(pass!==pass2){showErr('Passwords do not match.');reset();return;}
      if(pass.length<6){showErr('Password must be 6+ characters.');reset();return;}
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
      await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,email,displayName:name,createdAt:serverTimestamp()});
    }
  }catch(e){
    const msgs={'auth/email-already-in-use':'Email already registered.','auth/wrong-password':'Wrong password.','auth/user-not-found':'No account found.','auth/invalid-credential':'Invalid email or password.','auth/too-many-requests':'Too many attempts. Try later.','auth/invalid-email':'Invalid email.'};
    showErr(msgs[e.code]||e.message);reset();
  }
  function showErr(m){errEl.style.display='flex';errEl.textContent=m;}
  function reset(){btn.textContent=mode==='login'?'Sign In to FinPilot':'Create My Account';btn.disabled=false;}
};

// ── Navigation ──
window.setTab = tab => {
  activeTab=tab;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===tab));
  document.getElementById('page-content').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  setTimeout(()=>{
    if(tab==='dashboard') renderDashboard();
    else if(tab==='transactions') renderTransactions();
    else if(tab==='insights') renderInsights();
    else if(tab==='budget') renderBudget();
    else if(tab==='profile') renderProfile();
    else if(tab==='goals') renderGoals();
    else if(tab==='accounts') renderAccounts();
    else if(tab==='recurring') renderRecurring();
    else if(tab==='analytics') renderAnalytics();
  },80);
};

// ── Helpers ──
function getMonthTx(month){
  const m=month||currMonth();
  return transactions.filter(t=>{
    if(!t.date) return false;
    const ds = typeof t.date==='string' ? t.date : (t.date.toDate ? t.date.toDate().toISOString() : String(t.date));
    return ds.substring(0,7)===m;
  });
}
function getSummary(month){
  const tx=getMonthTx(month);
  const income=tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return{income,expense,balance:income-expense};
}
function getCatBreakdown(month){
  const tx=getMonthTx(month).filter(t=>t.type==='expense');
  const map={};tx.forEach(t=>map[t.category]=(map[t.category]||0)+t.amount);
  return Object.entries(map).map(([c,a])=>({category:c,amount:a})).sort((a,b)=>b.amount-a.amount);
}
function getBudgetUsage(){
  const cm=currMonth(); const mb=budgets.filter(b=>b.month===cm);
  const exTx=getMonthTx().filter(t=>t.type==='expense');
  return mb.map(b=>{
    const spent=exTx.filter(t=>t.category===b.category).reduce((s,t)=>s+t.amount,0);
    const pct=b.amount>0?(spent/b.amount)*100:0;
    return{...b,spent,percentage:pct,exceeded:spent>b.amount};
  });
}
function getNetWorth(){ return accounts.reduce((s,a)=>s+(a.balance||0),0); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ── DASHBOARD ──
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderDashboard(){
  const s=getSummary(); const bd=getCatBreakdown(); const recent=transactions.slice(0,5);
  const name=currentUser?.displayName?.split(' ')[0]||currentUser?.email?.split('@')[0]||'there';
  const bUsage=getBudgetUsage(); const exceeded=bUsage.filter(b=>b.exceeded);
  const netWorth=getNetWorth();

  document.getElementById('page-content').innerHTML=`
  <div class="page-scroll">
    <div class="page-header">
      <div><div class="page-greeting">Hello, ${name} 👋</div><div class="page-sub">${monthLabel()}</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="icon-btn-sm" onclick="window.setTab('analytics')">📊</button>
        <button class="avatar-btn" onclick="window.setTab('profile')">${(name[0]||'U').toUpperCase()}</button>
      </div>
    </div>
    ${exceeded.length?`<div class="alert-strip" onclick="window.setTab('budget')">🚨 ${exceeded.length} budget${exceeded.length>1?'s':''} exceeded — tap to view</div>`:''}
    <div class="balance-card">
      <div class="bal-glow"></div>
      <div class="bal-label">THIS MONTH BALANCE</div>
      <div class="bal-amount ${s.balance>=0?'positive':'negative'}">${s.balance>=0?'+':'-'}${fmtC(Math.abs(s.balance))}</div>
      <div class="bal-period">${monthLabel()}</div>
      ${accounts.length?`<div class="bal-networth">Net Worth: <strong>${fmtC(netWorth)}</strong></div>`:''}
      <div class="ie-row">
        <div class="ie-item"><div class="ie-dot" style="background:var(--income)"></div><div><div class="ie-lbl">INCOME</div><div class="ie-val income-val">+${fmtC(s.income)}</div></div></div>
        <div class="ie-divider"></div>
        <div class="ie-item"><div class="ie-dot" style="background:var(--expense)"></div><div><div class="ie-lbl">EXPENSES</div><div class="ie-val expense-val">-${fmtC(s.expense)}</div></div></div>
      </div>
    </div>
    ${transactions.length>0 && s.income===0 && s.expense===0 ? `<div style="margin:6px 16px 0;background:rgba(255,184,0,0.08);border:1px solid rgba(255,184,0,0.3);border-radius:10px;padding:9px 13px;font-size:12px;color:#FFB800">⚠️ No transactions in <strong>${monthLabel()}</strong>. Your ${transactions.length} transaction(s) are in other months. <span style="text-decoration:underline;cursor:pointer" onclick="window.setTab('transactions')">View all →</span></div>` : ''}
    <div class="quick-actions">
      <button class="qa-btn primary" onclick="window.openAddTx('expense')"><span>💸</span><span>Expense</span></button>
      <button class="qa-btn secondary" onclick="window.openAddTx('income')"><span>💰</span><span>Income</span></button>
      <button class="qa-btn tertiary" onclick="window.setTab('goals')"><span>🎯</span><span>Goals</span></button>
      <button class="qa-btn quaternary" onclick="window.setTab('accounts')"><span>🏦</span><span>Accounts</span></button>
    </div>
    ${transactions.length ? `<div style="display:flex;gap:7px;padding:10px 16px 0">
      <div style="flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:9px 5px;text-align:center">
        <div style="font-size:9px;color:var(--text-muted);font-weight:700;letter-spacing:0.8px;margin-bottom:3px">ALL TIME IN</div>
        <div style="font-family:var(--font-d);font-size:12px;font-weight:800;color:var(--income)">${fmtC(transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0))}</div>
      </div>
      <div style="flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:9px 5px;text-align:center">
        <div style="font-size:9px;color:var(--text-muted);font-weight:700;letter-spacing:0.8px;margin-bottom:3px">ALL TIME OUT</div>
        <div style="font-family:var(--font-d);font-size:12px;font-weight:800;color:var(--expense)">${fmtC(transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0))}</div>
      </div>
      <div style="flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:9px 5px;text-align:center">
        <div style="font-size:9px;color:var(--text-muted);font-weight:700;letter-spacing:0.8px;margin-bottom:3px">TOTAL TX</div>
        <div style="font-family:var(--font-d);font-size:12px;font-weight:800;color:var(--text)">${transactions.length}</div>
      </div>
    </div>` : ''}
    ${bd.length?`<div class="section"><div class="section-hdr"><div class="section-title">Top Spending</div><button class="see-all" onclick="window.setTab('insights')">Insights →</button></div>
    <div class="card">${bd.slice(0,4).map(item=>{const cat=getCat(item.category);const pct=s.expense>0?(item.amount/s.expense)*100:0;
      return `<div class="cat-row"><span class="cat-icon">${cat.icon}</span><span class="cat-name">${cat.label}</span><div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.min(pct,100)}%;background:${cat.color}"></div></div><span class="cat-amt">${fmtC(item.amount)}</span></div>`;
    }).join('')}</div></div>`:''}
    ${goals.length?`<div class="section"><div class="section-hdr"><div class="section-title">🎯 Goals</div><button class="see-all" onclick="window.setTab('goals')">See all →</button></div>
    <div class="card">${goals.slice(0,2).map(g=>{const pct=Math.min((g.saved/g.target)*100,100);
      return `<div class="goal-mini"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:13px;font-weight:600">${g.icon||'🎯'} ${g.name}</span><span style="font-size:12px;color:var(--primary);font-weight:700">${pct.toFixed(0)}%</span></div>
      <div class="cat-bar-wrap" style="height:6px"><div class="cat-bar" style="width:${pct}%;background:var(--primary)"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:3px"><span style="font-size:10px;color:var(--text-muted)">${fmtC(g.saved)}</span><span style="font-size:10px;color:var(--text-muted)">${fmtC(g.target)}</span></div></div>`;
    }).join('')}</div></div>`:''}
    <div class="section">
      <div class="section-hdr"><div class="section-title">Recent</div><button class="see-all" onclick="window.setTab('transactions')">See all →</button></div>
      ${recent.length===0?`<div class="empty-card"><div class="empty-emoji">💳</div><div class="empty-title">No transactions yet</div><div class="empty-sub">Add your first one!</div><button class="btn-primary" style="margin-top:14px;width:auto;padding:10px 24px" onclick="window.openAddTx('expense')">+ Add</button></div>`:`<div class="card">${recent.map((tx,i)=>txRow(tx,i<recent.length-1)).join('')}</div>`}
    </div>
  </div>`;
}

function txRow(tx,border=true){
  const cat=getCat(tx.category);
  return `<div class="tx-row ${border?'tx-border':''}" onclick="window.deleteTx('${tx.id}','${(tx.note||cat.label).replace(/'/g,"\\'")}')">
    <div class="tx-icon-bg" style="background:${cat.color}22">${cat.icon}</div>
    <div class="tx-body"><div class="tx-name">${tx.note||cat.label}</div><div class="tx-meta">${cat.label}${tx.account?' · '+tx.account:''} · ${fmtDate(tx.date)}${tx.source==='sms'?' 📱':''}</div></div>
    <div class="tx-amt ${tx.type==='income'?'income-val':'expense-val'}">${tx.type==='income'?'+':'-'}${fmtC(tx.amount)}</div>
  </div>`;
}

// ── ADD TRANSACTION ──
window.openAddTx = (defaultType='expense') => {
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('modal-overlay').innerHTML=`
  <div class="modal">
    <div class="modal-header"><button class="modal-close" onclick="window.closeModal()">✕</button><div class="modal-title">New Transaction</div><div style="width:32px"></div></div>
    <div class="modal-body">
      <div class="type-toggle">
        <button id="type-expense" class="type-btn expense ${defaultType==='expense'?'active':''}" onclick="window._setTxType('expense')">💸 Expense</button>
        <button id="type-income" class="type-btn income ${defaultType==='income'?'active':''}" onclick="window._setTxType('income')">💰 Income</button>
      </div>
      <div class="amount-row"><span class="amount-prefix">${CS()}</span><input id="tx-amount" class="amount-input" type="number" min="0.01" step="0.01" placeholder="0.00" autofocus></div>

window._setTxType = type => {
  window._currentTxType=type; window._selectedCat='';
  document.getElementById('type-expense').classList.toggle('active',type==='expense');
  document.getElementById('type-income').classList.toggle('active',type==='income');
  document.getElementById('cat-chips').innerHTML=CATEGORIES[type].map(c=>`<button class="cat-chip" data-id="${c.id}" data-color="${c.color}" onclick="window._selectCat('${c.id}','${c.color}')"><span>${c.icon}</span>${c.label}</button>`).join('');
};
window._selectCat = (id,color) => {
  window._selectedCat=id;
  document.querySelectorAll('.cat-chip').forEach(c=>{const a=c.dataset.id===id;c.style.borderColor=a?color:'';c.style.background=a?color+'22':'';c.style.color=a?color:'';});
};
window._submitTx = async () => {
  const amount=parseFloat(document.getElementById('tx-amount').value);
  const date=document.getElementById('tx-date').value;
  const note=document.getElementById('tx-note').value.trim();
  const account=document.getElementById('tx-account').value;
  const isRec=document.getElementById('tx-recurring').checked;
  const errEl=document.getElementById('tx-err'); errEl.style.display='none';
  if(!amount||amount<=0){errEl.style.display='block';errEl.textContent='Enter a valid amount.';return;}
  if(!date){errEl.style.display='block';errEl.textContent='Select a date.';return;}
  if(!window._selectedCat){errEl.style.display='block';errEl.textContent='Select a category.';return;}
  const btn=document.getElementById('tx-submit'); btn.textContent='Saving...';btn.disabled=true;
  try{
    const txData={type:window._currentTxType,amount,category:window._selectedCat,note,date,createdAt:serverTimestamp()};
    if(account) txData.account=account;
    await addDoc(collection(db,'users',currentUser.uid,'transactions'),txData);
    if(isRec){
      await addDoc(collection(db,'users',currentUser.uid,'recurring'),{
        type:window._currentTxType,amount,category:window._selectedCat,note,account,
        dayOfMonth:new Date(date).getDate()||1,active:true,createdAt:serverTimestamp()
      });
    }
    if(account){
      const acc=accounts.find(a=>a.name===account);
      if(acc){
        const newBal=window._currentTxType==='income'?(acc.balance||0)+amount:(acc.balance||0)-amount;
        await setDoc(doc(db,'users',currentUser.uid,'accounts',acc.id),{...acc,balance:newBal});
      }
    }
    showToast('✅ Transaction saved!'); window.closeModal();
  }catch(e){errEl.style.display='block';errEl.textContent='Error saving.';btn.textContent='Save Transaction';btn.disabled=false;}
};
window.closeModal = () => { document.getElementById('modal-overlay').style.display='none'; document.getElementById('modal-overlay').innerHTML=''; };
window.deleteTx = (id,name) => { if(!confirm(`Delete "${name}"?`)) return; deleteDoc(doc(db,'users',currentUser.uid,'transactions',id)); showToast('🗑️ Deleted'); };

    <div class="section">
      <div class="section-title" style="margin-bottom:10px">💡 Smart Insights</div>
      ${insights.length===0?`<div class="empty-card"><div class="empty-emoji">🔮</div><div class="empty-title">Add transactions for insights</div></div>`:insights.map(ins=>`<div class="insight-card" style="border-left-color:${ins.color}"><div class="ins-hdr"><span>${ins.icon}</span><span class="ins-title">${ins.title}</span></div><div class="ins-body">${ins.body}</div></div>`).join('')}
    </div>

function generateInsights(){
  const insights=[]; if(!transactions.length) return insights;
  const s=getSummary(); const tx=getMonthTx(); const expenses=tx.filter(t=>t.type==='expense'); const breakdown=getCatBreakdown();
  if(s.income>0){const rate=((s.income-s.expense)/s.income)*100;
    if(rate>=20) insights.push({icon:'🏆',title:'Great savings rate!',body:`Saving ${rate.toFixed(0)}% of income — above the 20% target!`,color:'#00D4A3'});
    else if(rate<0) insights.push({icon:'⚠️',title:'Overspending!',body:`Expenses exceed income by ${fmtC(Math.abs(s.expense-s.income))}.`,color:'#FF4757'});
    else insights.push({icon:'💡',title:'Room to save more',body:`Saving ${rate.toFixed(0)}% of income. Try to reach 20%+.`,color:'#FFB800'});
  }
  if(breakdown.length>0){const top=getCat(breakdown[0].category);const pct=s.expense>0?(breakdown[0].amount/s.expense)*100:0;insights.push({icon:top.icon,title:`${top.label} is top spend`,body:`${fmtC(breakdown[0].amount)} (${pct.toFixed(0)}%) on ${top.label} this month.`,color:top.color});}
  if(expenses.length>0){const avg=s.expense/expenses.length;insights.push({icon:'📊',title:`${tx.length} transactions`,body:`${expenses.length} expenses, avg ${fmtC(avg)} each.`,color:'#7B61FF'});}
  const large=expenses.find(t=>t.amount>s.expense*0.25&&t.amount>50);
  if(large){const cat=getCat(large.category);insights.push({icon:'🔍',title:'Large expense detected',body:`${fmtC(large.amount)} on ${cat.label}${large.note?' ('+large.note+')':''} is 25%+ of monthly spend.`,color:'#FF9F43'});}
  if(goals.length>0){const near=goals.find(g=>(g.saved/g.target)>=0.8&&g.saved<g.target);if(near) insights.push({icon:'🎯',title:'Goal almost reached!',body:`"${near.name}" is ${((near.saved/near.target)*100).toFixed(0)}% funded! Just ${fmtC(near.target-near.saved)} more!`,color:'#00D4A3'});}
  return insights;
}

window._parseSMS = () => {
  const sms=document.getElementById('sms-input').value.trim();
  const resultEl=document.getElementById('sms-result');

  if(!parsed){resultEl.style.display='block';resultEl.innerHTML='<div class="sms-err">Could not detect a transaction. Try a debit/credit alert from your bank.</div>';return;}
  const cat=getCat(parsed.category);

    <div class="sms-field"><span>Category</span><span>${cat.icon} ${cat.label}</span></div>
    <div class="sms-field"><span>Date</span><span>${parsed.date}</span></div>
    <button class="btn-primary" style="margin-top:12px" onclick="window._addParsedTx(${JSON.stringify(parsed).replace(/"/g,'&quot;')})">+ Add to Transactions</button>
  </div>`;
};
function parseBankSMS(sms){
  const s=sms.toLowerCase();
  let type='expense';
  if(/credit|credited|received|deposited|refund|cashback|added/.test(s)) type='income';
  if(/debit|debited|spent|paid|payment|withdrawn|purchase|pos|atm/.test(s)) type='expense';
  let amount=null;
  const amtPatterns=[/(?:inr|rs\.?|usd|\$|gbp|aed|eur)\s*([\d,]+\.?\d*)/i,/(?:amount|amt)\s*(?:of\s*)?(?:inr|rs\.)?\s*([\d,]+\.?\d*)/i,/([\d,]+\.\d{2})\s*(?:inr|rs|usd|debited|credited)/i,/(?:debited|credited)\s*(?:with\s*)?(?:inr|rs\.)?\s*([\d,]+\.?\d*)/i];
  for(const p of amtPatterns){const m=sms.match(p);if(m){amount=parseFloat(m[1].replace(/,/g,''));break;}}
  if(!amount||amount<=0) return null;
  let note='';
  const mps=[/(?:at|to|from|merchant)\s+([A-Z][A-Z\s\.\-&]{2,25})/i,/(?:towards|for)\s+([A-Z][A-Z\s\.\-&]{2,25})/i];
  for(const p of mps){const m=sms.match(p);if(m){note=m[1].trim();break;}}
  if(!note) note=type==='income'?'Bank Credit':'Bank Debit';
  let category=type==='income'?'other_inc':'other_exp';
  const rules=[
    {cat:'food',words:['zomato','swiggy','dominos','pizza','burger','mcdonalds','kfc','restaurant','cafe','food','starbucks','dunkin']},
    {cat:'transport',words:['uber','ola','rapido','irctc','metro','fuel','petrol','fastag','toll','bus','cab']},
    {cat:'shopping',words:['amazon','flipkart','myntra','zara','nykaa','mall','mart','shop','store','retail','meesho']},
    {cat:'bills',words:['electricity','airtel','jio','vodafone','broadband','water','gas','bsnl','bill','recharge','utility']},
    {cat:'health',words:['hospital','pharma','medicine','apollo','doctor','clinic','medplus','1mg','health','dental']},
    {cat:'education',words:['school','college','university','udemy','coursera','fees','education','byju','unacademy']},
    {cat:'entertain',words:['netflix','hotstar','spotify','bookmyshow','pvr','cinema','movie','gaming','prime']},
    {cat:'travel',words:['makemytrip','goibibo','booking','hotel','flight','airline','indigo','spicejet','airbnb']},
    {cat:'salary',words:['salary','payroll','paycheck','wages','stipend']},
    {cat:'investment',words:['mutual fund','zerodha','groww','sip','stock','shares','demat']},
  ];
  const fullText=sms.toLowerCase()+' '+note.toLowerCase();
  for(const rule of rules){if(rule.words.some(w=>fullText.includes(w))){category=rule.cat;break;}}
  let date=new Date().toISOString().split('T')[0];
  const dp=[/(\d{2})[\/\-](\d{2})[\/\-](\d{2,4})/,/(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i];
  for(const p of dp){const m=sms.match(p);if(m){try{const d=new Date(m[0]);if(!isNaN(d))date=d.toISOString().split('T')[0];}catch{}break;}}
  return{type,amount,note,category,date};
}

window._scanReceipt = file => {
  const resultEl=document.getElementById('receipt-result'); resultEl.style.display='block';
  resultEl.innerHTML='<div class="sms-parsed"><div class="sms-parsed-title">🔍 Scanning receipt...</div></div>';
  const reader=new FileReader();
  reader.onload = e => {
    setTimeout(()=>{
      const mockAmounts=[12.50,24.99,150.00,89.90,45.00,199.99,550.00,1250.00];
      const mockAmount=mockAmounts[Math.floor(Math.random()*mockAmounts.length)];
      resultEl.innerHTML=`<div class="sms-parsed"><div class="sms-parsed-title">📸 Receipt Scanned!</div>
        <div class="sms-field"><span>Detected Amount</span><span style="font-weight:700;color:var(--primary)">${fmtC(mockAmount)}</span></div>
        <div style="font-size:11px;color:var(--text-muted);margin:8px 0">💡 For real OCR, integrate Google Vision API</div>
        <button class="btn-primary" style="margin-top:8px" onclick="window._openTxWithAmt(${mockAmount})">+ Add as Expense</button>
      </div>`;
    },1500);
    reader.readAsDataURL(file.files[0]);
  };
  if(file.files[0]) reader.readAsDataURL(file.files[0]);
};
window._openTxWithAmt = amount => { window.openAddTx('expense'); setTimeout(()=>{const inp=document.getElementById('tx-amount');if(inp)inp.value=amount;},200); };
window._logout = async () => { if(!confirm('Sign out of FinPilot?')) return; await signOut(auth); };

.profile-avatar{width:54px;height:54px;border-radius:27px;background:linear-gradient(135deg,#00D4A3,#7B61FF);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:20px;font-weight:800;color:#fff;margin:0 auto 10px;box-shadow:0 0 20px rgba(0,212,163,0.2);}
.profile-name{font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;}
.profile-email{font-size:12px;color:var(--text-sec);margin-bottom:3px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 12px;}
.stat-card{background:var(--bg-card);border-radius:var(--r-lg);padding:12px 8px;border:1px solid var(--border);text-align:center;overflow:hidden;}
.stat-val{font-family:var(--font-d);font-size:14px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-lbl{font-size:10px;color:var(--text-muted);}
.logout-btn{padding:7px 12px;background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:var(--r-full);font-family:var(--font-b);font-size:11px;font-weight:600;color:var(--danger);cursor:pointer;}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;transition:background 0.15s;}
.menu-item:last-child{border-bottom:none;}
.menu-item:active{background:var(--bg-elevated);}
.menu-arrow{margin-left:auto;color:var(--text-muted);font-size:17px;}

.settings-section{padding:12px 16px 0;}
.settings-title{font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
.theme-toggle{display:flex;gap:6px;}
.theme-btn{flex:1;padding:9px 4px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg-elevated);font-family:var(--font-b);font-size:12px;font-weight:600;color:var(--text-sec);cursor:pointer;transition:all 0.15s;}
.theme-btn.active{border-color:var(--primary);background:var(--primary-dim);color:var(--primary);}
.currency-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.currency-chip{display:flex;flex-direction:column;align-items:center;padding:7px 3px;border-radius:var(--r-md);background:var(--bg-elevated);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;overflow:hidden;}
.currency-chip.active{border-color:var(--primary);background:var(--primary-dim);}
.curr-symbol{font-size:13px;font-weight:700;color:var(--text);line-height:1.2;}
.curr-code{font-size:8px;color:var(--text-muted);font-weight:600;}
.currency-chip.active .curr-symbol,.currency-chip.active .curr-code{color:var(--primary);}

.sms-textarea{width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;font-size:13px;color:var(--text);font-family:var(--font-b);resize:none;height:95px;line-height:1.5;outline:none;}
.sms-textarea:focus{border-color:var(--primary);}
.sms-textarea::placeholder{color:var(--text-muted);}
.sms-err{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:var(--r-md);padding:10px;font-size:13px;color:var(--danger);}
.sms-success{background:rgba(0,212,163,0.1);border:1px solid rgba(0,212,163,0.3);border-radius:var(--r-md);padding:10px;font-size:13px;color:var(--primary);font-weight:600;}
.sms-parsed{background:var(--bg-elevated);border-radius:var(--r-md);padding:13px;border:1px solid var(--border-light);}
.sms-parsed-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:9px;}
.sms-field{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.sms-field:last-of-type{border-bottom:none;}
.sms-field span:first-child{color:var(--text-sec);}
.sms-field span:last-child{color:var(--text);font-weight:600;}

.founder-card{background:var(--bg-card);border-radius:var(--r-lg);padding:14px;border:1px solid var(--border-light);overflow:hidden;position:relative;}
.founder-card::before{content:'';position:absolute;top:-30px;right:-30px;width:110px;height:110px;border-radius:55px;background:rgba(0,212,163,0.06);pointer-events:none;}
.founder-top{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.founder-avatar{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#00D4A3,#7B61FF);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:15px;font-weight:800;color:#fff;flex-shrink:0;}
.founder-badge{background:var(--primary-dim);border:1px solid var(--primary);color:var(--primary);font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r-full);}
.founder-name{font-family:var(--font-d);font-size:15px;font-weight:800;color:var(--text);margin-bottom:2px;}
.founder-title{font-size:11px;color:var(--primary);font-weight:600;margin-bottom:8px;}
.founder-bio{font-size:12px;color:var(--text-sec);line-height:17px;margin-bottom:10px;}
.founder-tags{display:flex;flex-wrap:wrap;gap:5px;}
.ftag{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-full);padding:4px 9px;font-size:10px;color:var(--text-sec);}

#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--bg-card);border-top-left-radius:26px;border-top-right-radius:26px;width:100%;max-width:480px;border-top:1px solid var(--border-light);max-height:92dvh;overflow-y:auto;animation:slideUp 0.3s ease;}
.modal::-webkit-scrollbar{display:none;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-card);z-index:1;}
.modal-close{width:30px;height:30px;border-radius:15px;background:var(--bg-elevated);border:none;color:var(--text-sec);font-size:13px;cursor:pointer;font-weight:700;}
.modal-title{font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--text);}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:13px;}
.type-toggle{display:flex;background:var(--bg);border-radius:var(--r-md);padding:4px;border:1px solid var(--border);}
.type-btn{flex:1;padding:9px;border-radius:var(--r-sm);border:none;font-family:var(--font-b);font-size:13px;font-weight:700;color:var(--text-sec);background:transparent;cursor:pointer;transition:all 0.2s;}
.type-btn.expense.active{background:linear-gradient(90deg,#FF6B6B,#EE5A24);color:#fff;}
.type-btn.income.active{background:linear-gradient(90deg,#00D4A3,#00B894);color:#000;}
.amount-row{display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 0;}
.amount-prefix{font-size:26px;color:var(--text-sec);font-weight:300;}
.amount-input{font-family:var(--font-d);font-size:38px;font-weight:800;color:var(--text);background:transparent;border:none;outline:none;width:150px;letter-spacing:-2px;text-align:center;}
.amount-input::placeholder{color:var(--text-muted);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-chips{display:flex;flex-wrap:wrap;gap:6px;}
.cat-chip{padding:6px 10px;border-radius:var(--r-full);background:var(--bg-elevated);border:1px solid var(--border);font-family:var(--font-b);font-size:11px;font-weight:600;color:var(--text-sec);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all 0.15s;}
.recurring-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-sec);cursor:pointer;}
.form-err{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:var(--r-md);padding:10px;font-size:13px;color:var(--danger);}

.empty-card{background:var(--bg-card);border-radius:var(--r-lg);padding:30px 22px;text-align:center;border:1px solid var(--border);margin:0 16px;}
.empty-emoji{font-size:42px;margin-bottom:12px;}
.empty-title{font-family:var(--font-d);font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;}
.empty-sub{font-size:12px;color:var(--text-sec);}

.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--r-full);padding:9px 18px;font-size:13px;font-weight:600;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.toast-warning{border-color:rgba(255,184,0,0.4);}
.toast.toast-danger{border-color:rgba(255,71,87,0.4);}

@media(max-width:390px){.bal-amount{font-size:26px;}.amount-input{font-size:32px;}.currency-grid{grid-template-columns:repeat(3,1fr);}.qa-btn{font-size:9px;}.form-row{grid-template-columns:1fr;}}
@media(max-width:360px){.form-row{grid-template-columns:1fr;}.summary-pills{flex-wrap:wrap;}}
@media(min-width:480px){#app-screen{border-left:1px solid var(--border);border-right:1px solid var(--border);}#modal-overlay{padding-bottom:0;}}
input[type="date"]::-webkit-calendar-picker-indicator,input[type="month"]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer;}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;}
</style>
</head>
<body>

<div id="auth-screen" style="display:none">
  <div class="auth-bg"><div class="auth-glow g1"></div><div class="auth-glow g2"></div></div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <div style="width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#00D4A3,#00B894);display:flex;align-items:center;justify-content:center;font-size:22px">✈</div>
    <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff">FinPilot</div>
  </div>
  <div style="color:#8A8A9A;font-size:13px">Loading...</div>
</div>

<div id="app-screen" style="display:none">
  <div class="top-bar">
    <div class="top-bar-logo">✈ FinPilot</div>
    <div style="display:flex;gap:7px">
      <button class="icon-btn-sm" onclick="window.setTab('analytics')">📊</button>
      <button class="icon-btn" onclick="window.openAddTx()">+</button>
    </div>
  </div>
  <div id="page-content"><div class="loading"><div class="spinner"></div></div></div>
  <nav class="bottom-nav">
    <div class="nav-item active" data-tab="dashboard" onclick="window.setTab('dashboard')"><div class="nav-emoji">🏠</div><div class="nav-label">Home</div></div>
    <div class="nav-item" data-tab="transactions" onclick="window.setTab('transactions')"><div class="nav-emoji">📋</div><div class="nav-label">Transactions</div></div>
    <div class="nav-item" data-tab="insights" onclick="window.setTab('insights')"><div class="nav-emoji">💡</div><div class="nav-label">Insights</div></div>
    <div class="nav-item" data-tab="budget" onclick="window.setTab('budget')"><div class="nav-emoji">🎯</div><div class="nav-label">Budget</div></div>
    <div class="nav-item" data-tab="profile" onclick="window.setTab('profile')"><div class="nav-emoji">👤</div><div class="nav-label">Profile</div></div>
  </nav>
</div>

<div id="modal-overlay" onclick="if(event.target===this)window.closeModal()"></div>
</body>
</html>
